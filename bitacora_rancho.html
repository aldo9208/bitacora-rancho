// ── Google Sheets ─────────────────────────────────────────────────────────────
const SHEETS_URL = "https://script.google.com/macros/s/AKfycbyDQAEPlf-By1gL1RhKQkDb5YAeEypB8vMaXupMl2qx2dtQFsG4n9kHrFSWiMCpQw_b/exec";

async function enviarASheets(semanaNum) {
  const registros = [];
  DIAS.forEach(dia => {
    const regs = load(`s${semanaNum}_${dia}`, []);
    regs.forEach(r => registros.push({ ...r, dia }));
  });
  const res = await fetch(SHEETS_URL, {
    method: "POST",
    body: JSON.stringify({ semana: semanaNum, registros }),
  });
  if (!res.ok) throw new Error("Error " + res.status);
  const data = await res.json();
  if (data.status !== "ok") throw new Error(data.message || "Error desconocido");
}
